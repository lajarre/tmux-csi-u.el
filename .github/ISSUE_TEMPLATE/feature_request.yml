name: feature request
description: Request a repo-scoped change.
title: "[feature]: "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        Keep requests tied to the tmux CSI-u problem. Note why the current repo shape is not enough.
  - type: textarea
    id: problem
    attributes:
      label: problem
      description: What user problem is still unsolved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: proposed change
      description: What should change in repo scope?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: alternatives considered
      description: What existing behavior, local override, or documentation path did you reject?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: verification plan
      description: Which `script/check` and manual verification steps would prove the change?
