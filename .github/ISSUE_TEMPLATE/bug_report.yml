name: bug report
description: Report a reproducible tmux CSI-u regression or integration bug.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks. Include a small repro and the latest `script/check` result.
  - type: textarea
    id: summary
    attributes:
      label: summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: repro steps
      description: Exact steps, keys, and commands.
      placeholder: |
        1. Start tmux with extended keys on.
        2. Run emacsclient -t -a ''.
        3. Press : in Evil normal state.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: environment
      description: Include tmux, Emacs, terminal app, input source, whether `tmux-emacs-csi-u-supported-p` returned non-nil, and whether the problem reproduces in a daemon-started `emacsclient -t` frame.
    validations:
      required: true
  - type: textarea
    id: gate
    attributes:
      label: verification
      description: Paste the relevant `script/check` output or the failing subset.
